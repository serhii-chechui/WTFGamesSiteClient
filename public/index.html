<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#1E2033" />
        <meta
            name="description"
            content="WTFGames is an indie game studio building mobile games and desktop applications that entertain, challenge, and inspire."
        />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
        <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->

        <!--
      Canonical URL. Note this is a client-side-rendered SPA with a single
      static index.html served for every route (see App.js), so this is
      necessarily one canonical URL for all routes rather than a per-route
      one. A true per-route canonical would require server-side rendering
      or prerendering (e.g. react-snap) plus react-helmet-async to vary
      <head> per page - out of scope here; this is a known, accepted
      trade-off for a small CSR marketing site.
    -->
        <link rel="canonical" href="https://www.wtfgames.com.ua/" />

        <!--
      Open Graph / Twitter Card metadata for link previews (social media,
      Discord, Slack, etc).
    -->
        <meta property="og:title" content="WTFGames" />
        <meta
            property="og:description"
            content="WTFGames is an indie game studio building mobile games and desktop applications that entertain, challenge, and inspire."
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://www.wtfgames.com.ua/" />
        <meta property="og:image" content="https://www.wtfgames.com.ua/logo512.png" />

        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="WTFGames" />
        <meta
            name="twitter:description"
            content="WTFGames is an indie game studio building mobile games and desktop applications that entertain, challenge, and inspire."
        />
        <meta name="twitter:image" content="https://www.wtfgames.com.ua/logo512.png" />

        <title>WTFGames</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    --></body>
</html>
